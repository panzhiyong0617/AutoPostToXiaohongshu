name: Auto Post to Xiaohongshu
on:
schedule:
 
- cron: '0 0,12 * * *'
workflow_dispatch:
jobs:
post:
runs-on: ubuntu-latest
steps:
- uses: actions/checkout@v4
- name: Set up Python
uses: actions/setup-python@v5
with:
python-version: '3.10'
- name: Install dependencies
run: |
pip install requests
- name: Run post script
run: python post_to_xhs.py
