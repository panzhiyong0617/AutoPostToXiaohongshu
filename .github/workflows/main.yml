name: Auto Post to Xiaohongshu
on:
schedule:
- cron: '0 0 * * *'
jobs:
post:
runs-on: ubuntu-latest
steps:
- name: Checkout code
uses: actions/checkout@v4
- name: Set up Python
uses: actions/setup-python@v5
with:
python-version: '3.11'
- name: Install dependencies
run: pip install requests
- name: Post to Xiaohongshu
run: python post_to_xhs.py
